<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container text-center">
        <h1 th:text="#{error.title}">Ha ocurrido un error</h1>
        <p th:text="#{error.message}">La operación no se ha podido completar correctamente.</p>
        <a class="btn btn-primary" th:href="@{/}" th:text="#{error.back}">Volver al inicio</a>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
