<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container"
         th:with="sizeUnitLabel=${#messages.msgOrNull('size.unit.' + estimation.sourceSizeUnitCode) != null ? #messages.msg('size.unit.' + estimation.sourceSizeUnitCode) : estimation.sourceSizeUnitCode}">
        <h1 th:text="#{delphi.iteration.add.title}">Registrar iteración de la conversión Delphi</h1>

        <div class="card mb-4">
            <div class="card-header" th:text="#{delphi.iteration.referenceModules.title}">Módulos de referencia</div>
            <div class="card-body">
                <p>
                    <strong th:text="#{delphi.field.minimumModule}">Módulo mínimo</strong>:
                    <span th:text="${estimation.minimumModuleNameSnapshot}">Mínimo</span>
                    (
                    <span th:text="${#numbers.formatDecimal(estimation.minimumModuleSizeSnapshot, 1, 2)}">0.00</span>
                    <span th:text="${sizeUnitLabel}">PF</span>
                    )
                </p>

                <p>
                    <strong th:text="#{delphi.field.maximumModule}">Módulo máximo</strong>:
                    <span th:text="${estimation.maximumModuleNameSnapshot}">Máximo</span>
                    (
                    <span th:text="${#numbers.formatDecimal(estimation.maximumModuleSizeSnapshot, 1, 2)}">0.00</span>
                    <span th:text="${sizeUnitLabel}">PF</span>
                    )
                </p>

                <p class="mb-0">
                    <strong th:text="#{delphi.field.expertCount}">Número de expertos</strong>:
                    <span th:text="${estimation.expertCount}">3</span>
                </p>
            </div>
        </div>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/delphi/{delphiEstimationId}/iterations/add(
                  projectId=${project.id},
                  delphiEstimationId=${estimation.id})}"
              th:object="${iterationForm}">

            <input type="hidden" th:field="*{expectedExpertCount}"/>

            <div class="alert alert-danger"
                 th:if="${#fields.hasGlobalErrors()}">
                <div th:each="error : ${#fields.globalErrors()}"
                     th:text="${error}">
                    Error global
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header" th:text="#{delphi.iteration.estimates.title}">Estimaciones de expertos</div>
                <div class="card-body">

                    <div th:each="expert, stat : *{expertEstimates}" class="border rounded p-3 mb-3">
                        <h6 class="mb-3">
                            <span th:text="#{delphi.iteration.expert.title}">Experto</span>
                            <span th:text="${stat.index + 1}">1</span>
                        </h6>

                        <div class="form-group">
                            <label th:text="#{delphi.iteration.field.evaluatorAlias}">Alias</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{expertEstimates[__${stat.index}__].evaluatorAlias}">
                            <span class="text-danger"
                                  th:if="${#fields.hasErrors('expertEstimates[' + stat.index + '].evaluatorAlias')}"
                                  th:errors="*{expertEstimates[__${stat.index}__].evaluatorAlias}"></span>
                        </div>

                        <div class="form-group">
                            <label th:text="#{delphi.iteration.field.minimumModuleEstimatedEffortHours}">
                                H-Persona estimadas módulo mínimo
                            </label>
                            <input type="number"
                                   class="form-control"
                                   th:field="*{expertEstimates[__${stat.index}__].minimumModuleEstimatedEffortHours}"
                                   min="0.01"
                                   step="0.01">
                            <span class="text-danger"
                                  th:if="${#fields.hasErrors('expertEstimates[' + stat.index + '].minimumModuleEstimatedEffortHours')}"
                                  th:errors="*{expertEstimates[__${stat.index}__].minimumModuleEstimatedEffortHours}"></span>
                        </div>

                        <div class="form-group">
                            <label th:text="#{delphi.iteration.field.maximumModuleEstimatedEffortHours}">
                                H-Persona estimadas módulo máximo
                            </label>
                            <input type="number"
                                   class="form-control"
                                   th:field="*{expertEstimates[__${stat.index}__].maximumModuleEstimatedEffortHours}"
                                   min="0.01"
                                   step="0.01">
                            <span class="text-danger"
                                  th:if="${#fields.hasErrors('expertEstimates[' + stat.index + '].maximumModuleEstimatedEffortHours')}"
                                  th:errors="*{expertEstimates[__${stat.index}__].maximumModuleEstimatedEffortHours}"></span>
                        </div>

                        <div class="form-group mb-0">
                            <label th:text="#{delphi.iteration.field.comments}">Comentarios</label>
                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{expertEstimates[__${stat.index}__].comments}"></textarea>
                        </div>
                    </div>

                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{delphi.iteration.add.submit}">
                Guardar iteración
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points/delphi/{delphiEstimationId}(
                   projectId=${project.id},
                   delphiEstimationId=${estimation.id})}"
               th:text="#{common.action.cancel}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
