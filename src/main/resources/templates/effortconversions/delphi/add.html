<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1>Iniciar calibración Delphi</h1>

        <div class="card mb-4">
            <div class="card-header">Análisis de tamaño origen</div>
            <div class="card-body">
                <p><strong>Proyecto:</strong> <span th:text="${project.name}">Proyecto</span></p>
                <p><strong>Técnica:</strong> <span th:text="${analysis.techniqueCode}">PF</span></p>
                <p><strong>Unidad:</strong> <span th:text="${analysis.sizeUnitCode}">PF</span></p>
                <p><strong>Tamaño calculado:</strong>
                    <span th:text="${#numbers.formatDecimal(analysis.calculatedSizeValue, 1, 2)}">0.00</span>
                </p>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Módulos y tamaños</div>
            <div class="card-body">
                <div th:if="${modulesList == null or modulesList.isEmpty()}"
                     class="alert alert-light border mb-0">
                    No hay módulos registrados.
                </div>

                <div class="table-responsive" th:if="${modulesList != null and !modulesList.isEmpty()}">
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Tamaño</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="module : ${modulesList}">
                            <td th:text="${module.name}">Módulo</td>
                            <td th:text="${#numbers.formatDecimal(moduleSizeById[module.id], 1, 2)}">0.00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:unless="${canStartDelphi}" class="alert alert-warning mt-3 mb-0">
                    Delphi necesita al menos dos módulos distintos con tamaño positivo y diferente.
                </div>
            </div>
        </div>

        <form method="post" th:action="@{/projects/{projectId}/function-points/delphi/add(projectId=${project.id})}"
              th:object="${createForm}">
            <div class="form-group">
                <label for="confidencePercentage">Porcentaje de confianza</label>
                <input id="confidencePercentage" type="number" step="0.01" class="form-control"
                       th:field="*{confidencePercentage}">
                <span class="text-danger" th:if="${#fields.hasErrors('confidencePercentage')}"
                      th:errors="*{confidencePercentage}"></span>
            </div>

            <div class="form-group">
                <label for="acceptableDeviationPercentage">Desviación aceptable (%)</label>
                <input id="acceptableDeviationPercentage" type="number" step="0.01" class="form-control"
                       th:field="*{acceptableDeviationPercentage}">
                <span class="text-danger" th:if="${#fields.hasErrors('acceptableDeviationPercentage')}"
                      th:errors="*{acceptableDeviationPercentage}"></span>
            </div>

            <div class="form-group">
                <label for="maximumIterations">Número máximo de iteraciones</label>
                <input id="maximumIterations" type="number" class="form-control" th:field="*{maximumIterations}">
                <span class="text-danger" th:if="${#fields.hasErrors('maximumIterations')}"
                      th:errors="*{maximumIterations}"></span>
            </div>

            <button type="submit" class="btn btn-primary mr-2" th:disabled="${!canStartDelphi}">
                Crear calibración
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points(projectId=${project.id})}">
                Volver
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
