<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>

<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container mt-4">
        <h1 class="mb-4" th:text="#{ucp.add.title}">
            Crear análisis UCP
        </h1>

        <div class="card mb-4">
            <div class="card-header" th:text="#{ucp.details.context}">
                Contexto del análisis
            </div>

            <div class="card-body">
                <form th:action="@{/projects/{projectId}/use-case-points/add(projectId=${project.id})}"
                      th:object="${analysisForm}"
                      method="post">

                    <div class="form-group">
                        <label for="systemBoundaryDescription"
                               th:text="#{ucp.field.systemBoundary}">
                            Límite del sistema
                        </label>

                        <textarea id="systemBoundaryDescription"
                                  class="form-control"
                                  rows="5"
                                  maxlength="2000"
                                  th:field="*{systemBoundaryDescription}"></textarea>

                        <small class="form-text text-muted"
                               th:text="#{ucp.help.systemBoundary}">
                            Describe qué parte del sistema queda incluida en el análisis.
                        </small>

                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('systemBoundaryDescription')}"
                             th:errors="*{systemBoundaryDescription}">
                            Error
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit"
                                class="btn btn-primary mr-2"
                                th:text="#{ucp.action.create}">
                            Crear análisis
                        </button>

                        <a class="btn btn-secondary"
                           th:href="@{/projects/{id}(id=${project.id})}"
                           th:text="#{common.back}">
                            Volver
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
