<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>

<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container-fluid fp-analysis-container">
        <h1 class="mb-4" th:text="#{account.profile.title}">
            Mi cuenta
        </h1>

        <div class="card mb-4">
            <div class="card-header" th:text="#{account.profile.header}">
                Datos de la cuenta
            </div>

            <div class="card-body">

                <div class="mb-3">
                    <h6 class="text-muted" th:text="#{user.management.field.username}">
                        Nombre de usuario
                    </h6>
                    <p class="card-text mb-0" th:text="${currentUser.username}">
                        usuario
                    </p>
                </div>

                <div class="mb-3">
                    <h6 class="text-muted" th:text="#{user.management.field.email}">
                        Email
                    </h6>
                    <p class="card-text mb-0" th:text="${currentUser.email}">
                        email
                    </p>
                </div>

                <div class="mb-3">
                    <h6 class="text-muted" th:text="#{user.management.field.role}">
                        Rol
                    </h6>
                    <p class="card-text mb-0"
                       th:text="${#messages.msg('user.role.' + currentUser.role.name())}">
                        Rol
                    </p>
                </div>

                <div class="mb-3"
                     th:if="${currentUser.role != null and currentUser.role.name() == 'ROLE_PROJECT_WORKER'}">
                    <h6 class="text-muted" th:text="#{user.management.field.projectManager}">
                        Jefe asociado
                    </h6>
                    <p class="card-text mb-0"
                       th:text="${projectManagerUsername != null and !#strings.isEmpty(projectManagerUsername) ? projectManagerUsername : '-'}">
                        jefe
                    </p>
                </div>

                <div class="mt-4">
                    <a class="btn btn-outline-primary mr-2"
                       th:href="@{/account/edit}"
                       th:text="#{account.profile.action.edit}">
                        Editar cuenta
                    </a>

                    <a class="btn btn-secondary"
                       th:href="@{/projects}"
                       th:text="#{common.back}">
                        Volver
                    </a>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
