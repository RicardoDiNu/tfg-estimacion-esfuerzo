<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head"></head>
<body class="app-page">

<nav th:replace="fragments/nav :: nav"></nav>

<main class="app-content">
    <div class="container">
        <h2 th:text="#{login.title}">Identifícate</h2>

        <div class="alert alert-success" th:if="${param.signupSuccess}" th:text="#{auth.signup.success}">
            Cuenta creada correctamente. Ya puedes iniciar sesión.
        </div>

        <form class="form-horizontal" method="post" action="/login">
            <div class="form-group">
                <label class="control-label col-sm-2" for="username" th:text="#{login.username}">Usuario</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" id="username" name="username" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2" for="password" th:text="#{login.password}">Contraseña</label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" id="password" name="password" required/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-offset-2 col-sm-10">
                    <button type="submit" class="btn btn-primary" th:text="#{login.submit}">Entrar</button>
                </div>
            </div>
        </form>
    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
