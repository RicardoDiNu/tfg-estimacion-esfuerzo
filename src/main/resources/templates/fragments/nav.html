<nav th:fragment="nav"
     class="navbar navbar-expand-lg navbar-dark app-navbar"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <a class="navbar-brand" th:href="@{/}" th:text="#{nav.brand}">
        Estimación
    </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" th:attr="aria-label=#{nav.toggle}">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav mr-auto">

            <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                <a class="nav-link dropdown-toggle"
                   href="#"
                   id="projectsMenu"
                   role="button"
                   data-toggle="dropdown"
                   aria-haspopup="true"
                   aria-expanded="false"
                   th:text="#{nav.projects}">
                    Proyectos
                </a>

                <div class="dropdown-menu" aria-labelledby="projectsMenu">
                    <a class="dropdown-item"
                       th:href="@{/projects}"
                       th:text="#{nav.projects.list}">
                        Mis proyectos
                    </a>

                    <a class="dropdown-item"
                       th:href="@{/projects/add}"
                       th:text="#{nav.projects.add}">
                        Crear proyecto
                    </a>
                </div>
            </li>

            <li class="nav-item dropdown"
                sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_PROJECT_MANAGER','ROLE_USER')">
                <a class="nav-link dropdown-toggle"
                   href="#"
                   id="usersMenu"
                   role="button"
                   data-toggle="dropdown"
                   aria-haspopup="true"
                   aria-expanded="false"
                   th:text="#{nav.users}">
                    Usuarios
                </a>

                <div class="dropdown-menu" aria-labelledby="usersMenu">
                    <a class="dropdown-item"
                       th:href="@{/users}"
                       th:text="#{nav.users.list}">
                        Ver usuarios
                    </a>

                    <a class="dropdown-item"
                       th:href="@{/users/add}"
                       th:text="#{nav.users.add}">
                        Crear usuario
                    </a>
                </div>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/help}" th:text="#{nav.help}">
                    Ayuda
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/about}" th:text="#{nav.about}">
                    Acerca de
                </a>
            </li>

        </ul>

        <ul class="navbar-nav ml-auto">

            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="btnLanguage" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <span th:text="#{language.change}">
                        Idioma
                    </span>
                </a>

                <div id="languageDropdownMenuButton"
                     class="dropdown-menu dropdown-menu-right"
                     aria-labelledby="btnLanguage">
                    <a class="dropdown-item" id="btnSpanish" data-lang="es">
                        <span th:text="#{language.es}">
                            Español
                        </span>
                    </a>

                    <a class="dropdown-item" id="btnEnglish" data-lang="en">
                        <span th:text="#{language.en}">
                            Inglés
                        </span>
                    </a>
                </div>
            </li>

            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link" id="signup" th:href="@{/signup}" th:text="#{nav.signup}">
                    Registrarse
                </a>
            </li>

            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link" id="login" th:href="@{/login}" th:text="#{nav.login}">
                    Iniciar sesión
                </a>
            </li>

            <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <span sec:authentication="name">
                        usuario
                    </span>
                </a>

                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userMenu">
                    <a class="dropdown-item"
                       th:href="@{/account}"
                       th:text="#{nav.account}">
                        Mi cuenta
                    </a>

                    <a class="dropdown-item"
                       id="logout"
                       th:href="@{/logout}"
                       th:text="#{nav.logout}">
                        Cerrar sesión
                    </a>
                </div>
            </li>

        </ul>
    </div>
</nav>
