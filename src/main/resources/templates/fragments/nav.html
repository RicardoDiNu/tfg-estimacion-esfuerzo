<nav th:fragment="nav"
     class="navbar navbar-expand-lg navbar-dark app-navbar"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <a class="navbar-brand" href="/">Estimación</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="/" th:text="#{nav.home}">Inicio</a>
            </li>

            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link" href="/home" th:text="#{nav.private}">Zona privada</a>
            </li>

            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link" href="/projects" th:text="#{nav.projects}">Proyectos</a>
            </li>
        </ul>

        <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="btnLanguage" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <span th:text="#{language.change}">Idioma</span>
                </a>
                <div id="languageDropdownMenuButton" class="dropdown-menu dropdown-menu-right"
                     aria-labelledby="btnLanguage">
                    <a class="dropdown-item" id="btnSpanish" data-lang="es">
                        <span th:text="#{language.es}">Español</span>
                    </a>
                    <a class="dropdown-item" id="btnEnglish" data-lang="en">
                        <span th:text="#{language.en}">Inglés</span>
                    </a>
                </div>
            </li>

            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link" id="signup" th:href="@{/signup}">
                    Registrarse
                </a>
            </li>

            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link" id="login" th:href="@{/login}">
                    Iniciar sesión
                </a>
            </li>

            <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <span sec:authentication="name">usuario</span>
                </a>
                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userMenu">
                    <a class="dropdown-item" id="logout" th:href="@{/logout}">
                        Cerrar sesión
                    </a>
                </div>
            </li>
        </ul>
    </div>
</nav>
