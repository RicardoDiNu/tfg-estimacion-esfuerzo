<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{requirement.add.title}">Nuevo requisito de usuario</h1>
        <p th:text="#{requirement.add.subtitle}">Introduce los datos básicos del requisito</p>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/add(
                  projectId=${project.id},
                  moduleId=${module.id})}"
              th:object="${requirement}">

            <div class="form-group">
                <label for="identifier" th:text="#{requirement.field.identifier}">Identificador</label>
                <input type="text"
                       class="form-control"
                       id="identifier"
                       th:field="*{identifier}"
                       required>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('identifier')}"
                      th:errors="*{identifier}"></span>
            </div>

            <div class="form-group">
                <label for="statement" th:text="#{requirement.field.statement}">Requisito</label>
                <textarea class="form-control"
                          id="statement"
                          th:field="*{statement}"
                          rows="4"
                          required></textarea>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('statement')}"
                      th:errors="*{statement}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{requirement.add.submit}">
                Guardar
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points/modules/{moduleId}(
                   projectId=${project.id},
                   moduleId=${module.id})}"
               th:text="#{requirement.add.cancel}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
