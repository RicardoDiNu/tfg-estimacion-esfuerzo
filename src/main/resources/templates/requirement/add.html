<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{requirement.add.title}">Nuevo requisito de usuario</h1>

        <div th:if="${validationError}" class="alert alert-danger">
            <span th:text="#{requirement.validation.identifierOrName}">Debes indicar al menos identificador o nombre.</span>
        </div>

        <form method="post"
              th:action="@{/projects/{projectId}/requirements/add(projectId=${project.id})}"
              th:object="${requirement}">
            <div class="form-group">
                <label for="identifier" th:text="#{requirement.field.identifier}">Identificador</label>
                <input type="text" class="form-control" id="identifier" th:field="*{identifier}">
            </div>

            <div class="form-group">
                <label for="name" th:text="#{requirement.field.name}">Nombre</label>
                <input type="text" class="form-control" id="name" th:field="*{name}">
            </div>

            <div class="form-group">
                <label for="description" th:text="#{requirement.field.description}">Descripción</label>
                <textarea class="form-control" id="description" rows="5" th:field="*{description}"></textarea>
            </div>

            <button type="submit" class="btn btn-primary mr-2" th:text="#{requirement.add.submit}">Guardar</button>
            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/requirements(projectId=${project.id})}"
               th:text="#{requirement.add.cancel}">Cancelar</a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
