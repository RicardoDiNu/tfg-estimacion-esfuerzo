<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{requirement.edit.title}">Editar requisito de usuario</h1>

        <form method="post"
              th:action="@{/projects/{projectId}/requirements/edit/{requirementId}(projectId=${project.id}, requirementId=${requirement.id})}"
              th:object="${requirement}">

            <div class="form-group">
                <label for="identifier" th:text="#{requirement.field.identifier}">Identificador</label>
                <input type="text"
                       class="form-control"
                       id="identifier"
                       th:field="*{identifier}"
                       maxlength="50"
                       required>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('identifier')}"
                      th:errors="*{identifier}"></span>
            </div>

            <div class="form-group">
                <label for="statement" th:text="#{requirement.field.statement}">Requisito</label>
                <textarea class="form-control"
                          id="statement"
                          th:field="*{statement}"
                          rows="5"
                          maxlength="2000"
                          required></textarea>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('statement')}"
                      th:errors="*{statement}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{requirement.edit.submit}">
                Guardar cambios
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/requirements/{requirementId}(projectId=${project.id}, requirementId=${requirement.id})}"
               th:text="#{requirement.edit.cancel}">Cancelar</a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
