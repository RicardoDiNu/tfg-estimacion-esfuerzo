<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb app-breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/projects}" th:text="#{breadcrumb.projects}">Proyectos</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">Proyecto</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{projectId}/function-points(projectId=${project.id})}" th:text="#{fp.details.title}">Análisis PF</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{projectId}/function-points/modules/{moduleId}(projectId=${project.id},moduleId=${module.id})}" th:text="${module.name}">Módulo</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}(projectId=${project.id},moduleId=${module.id},requirementId=${requirement.id})}" th:text="${requirement.identifier}">Requisito</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page" th:text="#{breadcrumb.editRequirement}">Editar requisito</li>
            </ol>
        </nav>

        <h1 th:text="#{requirement.edit.title}">Editar requisito de usuario</h1>
        <p th:text="#{requirement.edit.subtitle}">Modifica los datos del requisito</p>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/edit/{requirementId}(
                  projectId=${project.id},
                  moduleId=${module.id},
                  requirementId=${requirement.id})}"
              th:object="${requirement}">

            <div class="form-group">
                <label for="identifier" th:text="#{requirement.field.identifier}">Identificador</label>
                <input type="text"
                       class="form-control"
                       id="identifier"
                       th:field="*{identifier}"
                       required>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('identifier')}"
                      th:errors="*{identifier}"></span>
            </div>

            <div class="form-group">
                <label for="statement" th:text="#{requirement.field.statement}">Requisito</label>
                <textarea class="form-control"
                          id="statement"
                          th:field="*{statement}"
                          rows="4"
                          required></textarea>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('statement')}"
                      th:errors="*{statement}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{requirement.edit.submit}">
                Guardar cambios
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}(
                   projectId=${project.id},
                   moduleId=${module.id},
                   requirementId=${requirement.id})}"
               th:text="#{requirement.edit.cancel}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
