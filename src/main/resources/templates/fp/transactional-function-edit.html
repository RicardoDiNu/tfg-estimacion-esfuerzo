<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{fp.transactionalFunction.edit.title}">Editar función transaccional</h1>
        <p th:text="#{fp.transactionalFunction.edit.subtitle}">Modifica los datos necesarios para clasificar la función</p>

        <form method="post"
              th:action="@{/projects/{projectId}/requirements/{requirementId}/transactional-functions/edit/{transactionalFunctionId}(projectId=${project.id}, requirementId=${requirementId}, transactionalFunctionId=${transactionalFunction.id})}">
            <div class="form-group">
                <label for="type" th:text="#{fp.transactionalFunction.field.type}">Tipo</label>
                <select class="form-control" id="type" name="type" required>
                    <option th:each="type : ${transactionalFunctionTypes}"
                            th:value="${type}"
                            th:text="${type}"
                            th:selected="${type == transactionalFunction.type}">
                        EI
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="complexity">Complejidad</label>
                <select class="form-control" id="complexity" name="complexity" required>
                    <option value="">Selecciona una complejidad</option>
                    <option value="LOW" th:selected="${transactionalFunction.complexity != null and transactionalFunction.complexity.name() == 'LOW'}">Simple</option>
                    <option value="AVERAGE" th:selected="${transactionalFunction.complexity != null and transactionalFunction.complexity.name() == 'AVERAGE'}">Media</option>
                    <option value="HIGH" th:selected="${transactionalFunction.complexity != null and transactionalFunction.complexity.name() == 'HIGH'}">Compleja</option>
                </select>
            </div>

            <div class="form-group">
                <label for="name" th:text="#{fp.transactionalFunction.field.name}">Nombre</label>
                <input type="text"
                       class="form-control"
                       id="name"
                       name="name"
                       th:value="${transactionalFunction.name}"
                       required>
            </div>

            <div class="form-group">
                <label for="description" th:text="#{fp.transactionalFunction.field.description}">Descripción</label>
                <textarea class="form-control"
                          id="description"
                          name="description"
                          rows="4"
                          th:text="${transactionalFunction.description}"></textarea>
            </div>

            <button type="submit" class="btn btn-primary mr-2"
                    th:text="#{fp.transactionalFunction.edit.submit}">Guardar cambios</button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/requirements/{requirementId}(projectId=${project.id}, requirementId=${requirementId})}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
