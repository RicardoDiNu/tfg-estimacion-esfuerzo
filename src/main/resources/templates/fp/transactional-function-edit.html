<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{fp.transactionalFunction.edit.title}">Editar función transaccional</h1>
        <p th:text="#{fp.transactionalFunction.edit.subtitle}">Modifica los datos necesarios para clasificar la función</p>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}/transactional-functions/edit/{transactionalFunctionId}(
                  projectId=${project.id},
                  moduleId=${module.id},
                  requirementId=${requirementId},
                  transactionalFunctionId=${transactionalFunction.id})}"
              th:object="${transactionalFunction}">

            <div class="form-group">
                <label for="type" th:text="#{fp.transactionalFunction.field.type}">Tipo</label>
                <select id="type" class="form-control" th:field="*{type}">
                    <option value="" th:text="#{fp.field.typePrompt}">Selecciona un tipo</option>
                    <option th:each="type : ${transactionalFunctionTypes}"
                            th:value="${type}"
                            th:text="${type}">
                        EI
                    </option>
                </select>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('type')}"
                      th:errors="*{type}"></span>
            </div>

            <div class="form-group">
                <label for="name" th:text="#{fp.transactionalFunction.field.name}">Nombre</label>
                <input type="text"
                       id="name"
                       class="form-control"
                       th:field="*{name}"
                       required>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="description" th:text="#{fp.transactionalFunction.field.description}">Descripción</label>
                <textarea id="description"
                          class="form-control"
                          th:field="*{description}"
                          rows="4"></textarea>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"></span>
            </div>

            <div class="form-group">
                <label for="complexity" th:text="#{fp.transactionalFunction.field.complexity}">Complejidad</label>
                <select id="complexity" class="form-control" th:field="*{complexity}">
                    <option value="" th:text="#{fp.complexity.prompt}">Selecciona una complejidad</option>
                    <option th:each="complexity : ${complexities}"
                            th:value="${complexity}"
                            th:text="#{${'fp.complexity.' + #strings.toLowerCase(complexity.name())}}">
                        Media
                    </option>
                </select>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('complexity')}"
                      th:errors="*{complexity}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{fp.transactionalFunction.edit.submit}">
                Guardar cambios
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}(
                   projectId=${project.id},
                   moduleId=${module.id},
                   requirementId=${requirementId})}"
               th:text="#{fp.transactionalFunction.edit.cancel}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
