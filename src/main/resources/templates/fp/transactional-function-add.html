<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{requirement.transactionalFunction.add.title}">Añadir función transaccional derivada</h1>

        <form method="post"
              th:action="@{/projects/{projectId}/requirements/{requirementId}/transactional-functions/add(projectId=${project.id}, requirementId=${requirement.id})}">
            <div class="form-group">
                <label for="type" th:text="#{fp.transactionalFunction.field.type}">Tipo</label>
                <select class="form-control" id="type" name="type" required>
                    <option th:each="type : ${transactionalFunctionTypes}"
                            th:value="${type}"
                            th:text="${type}">
                        EI
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="complexity">Complejidad</label>
                <select class="form-control" id="complexity" name="complexity" required>
                    <option value="">Selecciona una complejidad</option>
                    <option value="LOW">Simple</option>
                    <option value="AVERAGE">Media</option>
                    <option value="HIGH">Compleja</option>
                </select>
            </div>

            <div class="form-group">
                <label for="name" th:text="#{fp.transactionalFunction.field.name}">Nombre</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="description" th:text="#{fp.transactionalFunction.field.description}">Descripción</label>
                <textarea class="form-control" id="description" name="description" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary mr-2"
                    th:text="#{requirement.transactionalFunction.add.submit}">Guardar</button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/requirements/{requirementId}(projectId=${project.id}, requirementId=${requirement.id})}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
