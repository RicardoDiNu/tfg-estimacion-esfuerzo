<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head"></head>
<body class="app-page">

<nav th:replace="fragments/nav :: nav"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{fp.dataFunction.edit.title}">Editar funciĂłn de datos</h1>
        <p th:text="#{fp.dataFunction.edit.subtitle}">Modifica los datos necesarios para clasificar la funciĂłn</p>

        <form method="post"
              th:action="@{/projects/{projectId}/requirements/{requirementId}/data-functions/edit/{dataFunctionId}(projectId=${project.id}, requirementId=${requirementId}, dataFunctionId=${dataFunction.id})}">
            <div class="form-group">
                <label for="type" th:text="#{fp.dataFunction.field.type}">Tipo</label>
                <select class="form-control" id="type" name="type" required="required">
                    <option th:each="type : ${dataFunctionTypes}"
                            th:value="${type}"
                            th:text="${type}"
                            th:selected="${type == dataFunction.type}">
                        ILF
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="name" th:text="#{fp.dataFunction.field.name}">Nombre</label>
                <input type="text" class="form-control" id="name" name="name" th:value="${dataFunction.name}" required="required">
            </div>

            <div class="form-group">
                <label for="description" th:text="#{fp.dataFunction.field.description}">DescripciĂłn</label>
                <textarea class="form-control" id="description" name="description" rows="4" th:text="${dataFunction.description}"></textarea>
            </div>

            <div class="form-group">
                <label for="detCount" th:text="#{fp.dataFunction.field.det}">DET</label>
                <input type="number" min="1" class="form-control" id="detCount" name="detCount" th:value="${dataFunction.detCount}" required="required">
            </div>

            <div class="form-group">
                <label for="retCount" th:text="#{fp.dataFunction.field.ret}">RET</label>
                <input type="number" min="1" class="form-control" id="retCount" name="retCount" th:value="${dataFunction.retCount}" required="required">
            </div>

            <button type="submit" class="btn btn-primary mr-2" th:text="#{fp.dataFunction.edit.submit}">Guardar cambios</button>
            <form method="post"
                  th:action="@{/projects/{projectId}/requirements/{requirementId}/data-functions/edit/{dataFunctionId}(projectId=${project.id}, requirementId=${requirementId}, dataFunctionId=${dataFunction.id})}">
        </form>
    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
