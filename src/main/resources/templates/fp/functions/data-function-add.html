<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb app-breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/projects}" th:text="#{breadcrumb.projects}">Proyectos</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">Proyecto</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{projectId}/function-points(projectId=${project.id})}" th:text="#{fp.details.title}">Análisis PF</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{projectId}/function-points/modules/{moduleId}(projectId=${project.id},moduleId=${module.id})}" th:text="${module.name}">Módulo</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}(projectId=${project.id},moduleId=${module.id},requirementId=${requirement.id})}" th:text="${requirement.identifier}">Requisito</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page" th:text="#{breadcrumb.addDataFunction}">Añadir función de datos</li>
            </ol>
        </nav>

        <h1 th:text="#{requirement.dataFunction.add.title}">Añadir función de datos derivada</h1>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}/data-functions/add(
                  projectId=${project.id},
                  moduleId=${module.id},
                  requirementId=${requirement.id})}"
              th:object="${dataFunction}">

            <div class="form-group">
                <label for="type" th:text="#{fp.dataFunction.field.type}">Tipo</label>
                <select id="type" class="form-control" th:field="*{type}">
                    <option value="" th:text="#{fp.field.typePrompt}">Selecciona un tipo</option>
                    <option th:each="type : ${dataFunctionTypes}"
                            th:value="${type}"
                            th:text="${type}">
                        ILF
                    </option>
                </select>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('type')}"
                      th:errors="*{type}"></span>
            </div>

            <div class="form-group">
                <label for="name" th:text="#{fp.dataFunction.field.name}">Nombre</label>
                <input type="text"
                       id="name"
                       class="form-control"
                       th:field="*{name}"
                       required>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="description" th:text="#{fp.dataFunction.field.description}">Descripción</label>
                <textarea id="description"
                          class="form-control"
                          th:field="*{description}"
                          rows="4"></textarea>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"></span>
            </div>

            <div class="form-group">
                <label for="complexity" th:text="#{fp.dataFunction.field.complexity}">Complejidad</label>
                <select id="complexity" class="form-control" th:field="*{complexity}">
                    <option value="" th:text="#{fp.complexity.prompt}">Selecciona una complejidad</option>
                    <option th:each="complexity : ${complexities}"
                            th:value="${complexity}"
                            th:text="#{${'fp.complexity.' + #strings.toLowerCase(complexity.name())}}">
                        Media
                    </option>
                </select>
                <span class="text-danger"
                      th:if="${#fields.hasErrors('complexity')}"
                      th:errors="*{complexity}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{requirement.dataFunction.add.submit}">
                Guardar
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points/modules/{moduleId}/requirements/{requirementId}(
                   projectId=${project.id},
                   moduleId=${module.id},
                   requirementId=${requirement.id})}"
               th:text="#{requirement.dataFunction.add.cancel}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
