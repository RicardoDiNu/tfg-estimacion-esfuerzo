<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{fp.edit.title}">Editar análisis PF</h1>

        <div class="alert alert-light border">
            <strong th:text="#{project.field.name}">Proyecto</strong>:
            <span th:text="${project.name}">Proyecto</span>
        </div>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/edit(projectId=${project.id})}"
              th:object="${analysis}">

            <div class="form-group">
                <label for="systemBoundaryDescription"
                       th:text="#{fp.field.systemBoundary}">
                    Límite del sistema
                </label>

                <textarea class="form-control"
                          id="systemBoundaryDescription"
                          th:field="*{systemBoundaryDescription}"
                          rows="6"
                          maxlength="2000"
                          required></textarea>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('systemBoundaryDescription')}"
                      th:errors="*{systemBoundaryDescription}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{fp.edit.submit}">
                Guardar cambios
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{projectId}/function-points(projectId=${project.id})}"
               th:text="#{fp.edit.cancel}">Cancelar</a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
