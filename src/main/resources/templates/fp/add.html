<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb app-breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/projects}" th:text="#{breadcrumb.projects}">Proyectos</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">Proyecto</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page" th:text="#{breadcrumb.createFunctionPointAnalysis}">Crear análisis PF</li>
            </ol>
        </nav>

        <h1 th:text="#{fp.add.title}">Nuevo análisis de Puntos Función</h1>
        <p th:text="#{fp.add.subtitle}">Define primero el límite del sistema a estimar</p>

        <div class="alert alert-light border">
            <strong th:text="#{project.field.name}">Nombre</strong>:
            <span th:text="${project.name}">Proyecto</span>
        </div>

        <form method="post"
              th:action="@{/projects/{projectId}/function-points/add(projectId=${project.id})}"
              th:object="${analysis}">

            <div class="form-group">
                <label for="systemBoundaryDescription"
                       th:text="#{fp.field.systemBoundary}">
                    Límite del sistema
                </label>

                <textarea class="form-control"
                          id="systemBoundaryDescription"
                          th:field="*{systemBoundaryDescription}"
                          rows="6"
                          maxlength="2000"
                          required></textarea>

                <span class="text-danger"
                      th:if="${#fields.hasErrors('systemBoundaryDescription')}"
                      th:errors="*{systemBoundaryDescription}"></span>
            </div>

            <button type="submit"
                    class="btn btn-primary mr-2"
                    th:text="#{fp.add.submit}">
                Crear análisis
            </button>

            <a class="btn btn-secondary"
               th:href="@{/projects/{id}(id=${project.id})}"
               th:text="#{fp.add.cancel}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
