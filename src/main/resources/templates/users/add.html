<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>


<script>
    document.addEventListener("DOMContentLoaded", function () {
        const roleSelect = document.getElementById("role");
        const projectManagerGroup = document.getElementById("project-manager-group");
        const projectManagerSelect = document.getElementById("projectManagerId");

        function updateProjectManagerVisibility() {
            if (!roleSelect || !projectManagerGroup) {
                return;
            }

            if (roleSelect.value === "ROLE_PROJECT_WORKER") {
                projectManagerGroup.style.display = "";
            } else {
                projectManagerGroup.style.display = "none";

                if (projectManagerSelect) {
                    projectManagerSelect.value = "";
                }
            }
        }

        updateProjectManagerVisibility();

        if (roleSelect) {
            roleSelect.addEventListener("change", updateProjectManagerVisibility);
        }
    });
</script>


<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container-fluid fp-analysis-container">
        <h1 class="mb-4" th:text="#{user.management.add.title}">
            Crear usuario
        </h1>

        <div class="card mb-4">
            <div class="card-header" th:text="#{user.management.add.header}">
                Datos del usuario
            </div>

            <div class="card-body">
                <form th:action="@{/users/add}"
                      th:object="${userForm}"
                      method="post">

                    <div th:if="${#fields.hasGlobalErrors()}"
                         class="alert alert-danger">
                        <p th:each="error : ${#fields.globalErrors()}"
                           th:text="${error}">
                            Error
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="username" th:text="#{user.management.field.username}">
                            Usuario
                        </label>
                        <input id="username"
                               type="text"
                               class="form-control"
                               th:field="*{username}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('username')}"
                             th:errors="*{username}">
                            Error
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email" th:text="#{user.management.field.email}">
                            Email
                        </label>
                        <input id="email"
                               type="email"
                               class="form-control"
                               th:field="*{email}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">
                            Error
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" th:text="#{user.management.field.password}">
                            Contraseña
                        </label>
                        <input id="password"
                               type="password"
                               class="form-control"
                               th:field="*{password}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}">
                            Error
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="passwordConfirm" th:text="#{user.management.field.passwordConfirm}">
                            Confirmar contraseña
                        </label>
                        <input id="passwordConfirm"
                               type="password"
                               class="form-control"
                               th:field="*{passwordConfirm}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('passwordConfirm')}"
                             th:errors="*{passwordConfirm}">
                            Error
                        </div>
                    </div>

                    <div class="form-group" th:if="${availableRoles != null and availableRoles.size() > 1}">
                        <label for="role" th:text="#{user.management.field.role}">
                            Rol
                        </label>
                        <select id="role"
                                class="form-control"
                                th:field="*{role}">
                            <option value=""
                                    th:text="#{form.select.placeholder}">
                                -- Selecciona una opción --
                            </option>

                            <option th:each="role : ${availableRoles}"
                                    th:value="${role}"
                                    th:text="${#messages.msg('user.role.' + role.name())}">
                                Rol
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('role')}"
                             th:errors="*{role}">
                            Error
                        </div>
                    </div>

                    <input th:if="${availableRoles != null and availableRoles.size() == 1}"
                           type="hidden"
                           th:field="*{role}">

                    <div id="project-manager-group"
                         class="form-group"
                         th:if="${availableProjectManagers != null and !availableProjectManagers.isEmpty()}">
                        <label for="projectManagerId" th:text="#{user.management.field.projectManager}">
                            Jefe asociado
                        </label>

                        <select id="projectManagerId"
                                class="form-control"
                                th:field="*{projectManagerId}">
                            <option value=""
                                    th:text="#{form.select.placeholder}">
                                -- Selecciona una opción --
                            </option>

                            <option th:each="manager : ${availableProjectManagers}"
                                    th:value="${manager.id}"
                                    th:text="${manager.username}">
                                jefe
                            </option>
                        </select>

                        <small class="form-text text-muted"
                               th:text="#{user.management.help.projectManager}">
                            Solo es necesario si se crea un trabajador.
                        </small>

                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('projectManagerId')}"
                             th:errors="*{projectManagerId}">
                            Error
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-primary mr-2"
                            th:text="#{user.management.action.save}">
                        Guardar
                    </button>

                    <a class="btn btn-secondary"
                       th:href="@{/users}"
                       th:text="#{common.back}">
                        Volver
                    </a>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
