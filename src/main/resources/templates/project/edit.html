<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <h1>Editar proyecto</h1>

        <form method="post"
              th:action="@{/projects/edit/{projectId}(projectId=${project.id})}"
              th:object="${project}">

            <input type="hidden" name="returnTo" th:value="${returnTo}"/>
            <input type="hidden" name="page" th:value="${page}"/>

            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text"
                       class="form-control"
                       id="name"
                       th:field="*{name}"
                       required>
            </div>

            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea class="form-control"
                          id="description"
                          th:field="*{description}"
                          rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary mr-2">
                Guardar cambios
            </button>

            <a class="btn btn-secondary"
               th:if="${returnTo == 'details'}"
               th:href="@{/projects/{projectId}(projectId=${project.id})}">
                Cancelar
            </a>

            <a class="btn btn-secondary"
               th:unless="${returnTo == 'details'}"
               th:href="@{/projects(page=${page})}">
                Cancelar
            </a>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
