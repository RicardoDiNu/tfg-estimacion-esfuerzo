<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head"></head>
<body class="app-page">

<nav th:replace="fragments/nav :: nav"></nav>

<main class="app-content">
    <div class="container">
        <h1 th:text="#{project.details.title}">Detalle del proyecto de estimación</h1>

        <div class="card mb-3">
            <div class="card-header" th:text="#{project.field.name}">Nombre</div>
            <div class="card-body">
                <p class="card-text" th:text="${project.name}">Nombre del proyecto</p>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header" th:text="#{project.field.description}">Descripción</div>
            <div class="card-body">
                <p class="card-text" th:text="${project.description}">Descripción del proyecto</p>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header" th:text="#{project.field.createdAt}">Fecha de creación</div>
            <div class="card-body">
                <p class="card-text"
                   th:text="${#temporals.format(project.createdAt, 'dd/MM/yyyy HH:mm')}">
                    16/04/2026 22:57
                </p>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header" th:text="#{project.field.updatedAt}">Fecha de actualización</div>
            <div class="card-body">
                <p class="card-text"
                   th:text="${#temporals.format(project.updatedAt, 'dd/MM/yyyy HH:mm')}">
                    16/04/2026 22:57
                </p>
            </div>
        </div>

        <a class="btn btn-primary mr-2"
           th:href="@{/projects/edit/{id}(id=${project.id}, returnTo='details')}"
           th:text="#{project.action.edit}">Editar</a>

        <a class="btn btn-danger mr-2"
           th:href="@{/projects/delete/{id}(id=${project.id})}"
           th:text="#{project.action.delete}"
           onclick="return confirm('¿Seguro que quieres eliminar este proyecto?');">Eliminar</a>

        <a class="btn btn-secondary"
           href="/projects"
           th:text="#{project.details.back}">Volver al listado</a>
    </div>
</main>

<footer th:replace="fragments/footer :: footer"></footer>

</body>
</html>
