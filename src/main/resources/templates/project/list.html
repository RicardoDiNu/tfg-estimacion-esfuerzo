<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="app-page">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<main class="app-content">
    <div class="container">
        <div class="mb-4">
            <h1 class="mb-3">Proyectos</h1>
            <a class="btn btn-primary" th:href="@{/projects/add}">Nuevo proyecto</a>
        </div>

        <div id="projects-container" th:fragment="projectsSection">
            <div th:if="${projectsList == null or projectsList.isEmpty()}" class="alert alert-light border">
                Todavía no hay proyectos registrados.
            </div>

            <div class="table-responsive" th:if="${projectsList != null and !projectsList.isEmpty()}">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Fecha de creación</th>
                        <th class="text-right"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${projectsList}">
                        <td class="text-truncate-cell"
                            th:text="${project.name}"
                            th:title="${project.name}">
                            Nombre del proyecto
                        </td>


                        <td th:text="${project.createdAt != null ? project.createdAt.format(T(java.time.format.DateTimeFormatter).ofPattern('dd/MM/yyyy HH:mm')) : '-'}">
                            19/04/2026 12:30
                        </td>

                        <td>
                            <a class="btn btn-sm btn-outline-primary mr-2"
                               th:href="@{/projects/{projectId}(projectId=${project.id})}">
                                Ver detalle
                            </a>

                            <a class="btn btn-sm btn-outline-danger"
                               th:href="@{/projects/delete/{projectId}(projectId=${project.id}, page=${projectsPage.number})}"
                               onclick="return confirm('¿Seguro que deseas eliminar este proyecto?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-4" th:if="${projectsPage.totalPages > 1}">
                <ul class="pagination justify-content-center mb-0">

                    <li class="page-item" th:classappend="${projectsPage.number == 0} ? 'disabled'">
                        <a class="page-link projects-page-link"
                           th:href="@{/projects/update(page=0)}"
                           th:attr="data-browser-url=@{/projects(page=0)}">
                            Primera
                        </a>
                    </li>

                    <li class="page-item" th:if="${projectsPage.number - 1 >= 0}">
                        <a class="page-link projects-page-link"
                           th:href="@{/projects/update(page=${projectsPage.number - 1})}"
                           th:attr="data-browser-url=@{/projects(page=${projectsPage.number - 1})}"
                           th:text="${projectsPage.number}">
                            1
                        </a>
                    </li>

                    <li class="page-item active">
                        <a class="page-link projects-page-link"
                           th:href="@{/projects/update(page=${projectsPage.number})}"
                           th:attr="data-browser-url=@{/projects(page=${projectsPage.number})}"
                           th:text="${projectsPage.number + 1}">
                            2
                        </a>
                    </li>

                    <li class="page-item" th:if="${projectsPage.number + 1 <= projectsPage.totalPages - 1}">
                        <a class="page-link projects-page-link"
                           th:href="@{/projects/update(page=${projectsPage.number + 1})}"
                           th:attr="data-browser-url=@{/projects(page=${projectsPage.number + 1})}"
                           th:text="${projectsPage.number + 2}">
                            3
                        </a>
                    </li>

                    <li class="page-item" th:classappend="${projectsPage.number == projectsPage.totalPages - 1} ? 'disabled'">
                        <a class="page-link projects-page-link"
                           th:href="@{/projects/update(page=${projectsPage.totalPages - 1})}"
                           th:attr="data-browser-url=@{/projects(page=${projectsPage.totalPages - 1})}">
                            Última
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
