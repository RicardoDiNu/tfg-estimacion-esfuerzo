about.features.delphi=Delphi.
about.features.transformation=Funciones de transformación.

about.technical.title=Base técnica
about.technical.text=La aplicación está desarrollada como una aplicación web Java con Spring Boot, Thymeleaf, Spring Security, JPA/Hibernate y PostgreSQL.
about.technical.deployment=También puede ejecutarse mediante Docker para facilitar su puesta en marcha en otros equipos.

