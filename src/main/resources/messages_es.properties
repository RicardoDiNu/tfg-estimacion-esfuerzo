about.title=Acerca de

about.project.title=Sobre la aplicación
about.project.text1=Esta aplicación web permite gestionar proyectos de estimación de software y calcular su tamaño, esfuerzo y coste.
about.project.text2=El sistema reúne en una misma herramienta la gestión de proyectos, la aplicación de técnicas de estimación, la conversión a esfuerzo y la generación de resultados.
about.project.text3=La aplicación está desarrollada como Trabajo Fin de Grado en Ingeniería Informática del Software.

about.scope.title=Alcance funcional
about.scope.projects=Gestión de proyectos de estimación.
about.scope.users=Gestión de usuarios, roles, trabajadores y permisos por proyecto.
about.scope.size=Estimación de tamaño mediante Puntos Función y Use Case Points.
about.scope.effort=Conversión de tamaño a esfuerzo mediante Delphi y funciones de transformación.
about.scope.cost=Estimación de coste a partir de horas-persona y tarifa horaria.
about.scope.outputs=Generación de informes PDF e importación/exportación XML.

