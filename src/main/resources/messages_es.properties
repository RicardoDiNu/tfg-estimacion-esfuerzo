help.title=Ayuda y manual de uso

help.common.type=Tipo
help.common.meaning=Significado
help.common.complexity=Complejidad

help.intro.title=Manual de uso de la aplicación
help.intro.text1=Esta aplicación permite crear proyectos de estimación de software y calcular su tamaño, esfuerzo y coste mediante distintas técnicas.
help.intro.text2=El flujo general consiste en crear un proyecto, completar un análisis de tamaño, convertir ese tamaño en esfuerzo y revisar los resultados obtenidos.

help.access.title=Acceso, registro e inicio de sesión
help.access.signup.title=Registro público
help.access.signup.text1=Desde la pantalla de registro se puede crear una nueva cuenta.
help.access.signup.text2=Las cuentas creadas mediante registro público se crean automáticamente como jefes de proyecto. Esto permite que un nuevo usuario pueda empezar a crear sus propios proyectos de estimación.
help.access.signup.text3=Los trabajadores no se crean mediante el registro público. Deben ser creados por un administrador o por un jefe de proyecto desde la gestión de usuarios.
help.access.login.title=Inicio de sesión
help.access.login.text=Para trabajar con proyectos es necesario iniciar sesión con un usuario válido.

help.workflow.title=Flujo general de uso
help.workflow.step1=Iniciar sesión o registrarse.
help.workflow.step2=Crear un proyecto de estimación.
help.workflow.step3=Configurar una tarifa horaria si se desea calcular coste.
help.workflow.step4=Crear un análisis de tamaño: Puntos Función o Use Case Points.
help.workflow.step5=Completar los datos del análisis.
help.workflow.step6=Revisar el tamaño calculado.
help.workflow.step7=Crear una conversión a esfuerzo mediante Delphi o función de transformación.
help.workflow.step8=Revisar el esfuerzo y el coste estimado.
help.workflow.step9=Generar informes PDF o exportar XML si es necesario.

help.roles.title=Tipos de usuario
help.roles.admin.title=Administrador
help.roles.admin.text=El administrador gestiona usuarios del sistema. Puede crear jefes de proyecto y trabajadores, editar sus datos básicos y realizar tareas generales de administración.
help.roles.manager.title=Jefe de proyecto
help.roles.manager.text=El jefe de proyecto crea y gestiona sus propios proyectos. También puede crear trabajadores, asignarlos a proyectos y concederles permisos.
help.roles.worker.title=Trabajador de proyecto
help.roles.worker.text=El trabajador accede únicamente a los proyectos a los que ha sido asignado. Según sus permisos, podrá consultar datos, editar análisis o gestionar conversiones a esfuerzo.

help.users.title=Gestión de usuarios
help.users.createManager.title=Crear un jefe de proyecto
help.users.createManager.step1=Entrar con un usuario administrador.
help.users.createManager.step2=Ir al menú Usuarios.
help.users.createManager.step3=Pulsar Crear usuario.
help.users.createManager.step4=Indicar nombre de usuario, correo electrónico y contraseña.
help.users.createManager.step5=Seleccionar el rol Jefe de proyecto.
help.users.createManager.step6=Guardar.
help.users.createWorker.title=Crear un trabajador
help.users.createWorker.text=Un trabajador puede ser creado por un administrador o por un jefe de proyecto. Si lo crea un jefe de proyecto, queda asociado automáticamente a él.
help.users.createWorker.step1=Ir al menú Usuarios.
help.users.createWorker.step2=Pulsar Crear usuario.
help.users.createWorker.step3=Indicar nombre de usuario, correo electrónico y contraseña.
help.users.createWorker.step4=Si se entra como administrador, seleccionar el jefe de proyecto asociado.
help.users.createWorker.step5=Guardar.
help.users.edit.title=Editar usuarios
help.users.edit.text=Desde la lista de usuarios se pueden modificar datos básicos como el correo electrónico o la contraseña.
help.users.delete.title=Eliminar usuarios
help.users.delete.text=La aplicación solo permite eliminar usuarios cuando la operación es válida. Puede haber restricciones si el usuario tiene información asociada.

help.account.title=Mi cuenta
help.account.text1=Cada usuario puede consultar sus datos desde la opción Mi cuenta.
help.account.text2=Desde esta sección se puede modificar el correo electrónico y cambiar la contraseña.
help.account.text3=El nombre de usuario, el rol y el jefe asociado no se modifican desde la edición de la cuenta personal.

help.projects.title=Proyectos de estimación
help.projects.text=Un proyecto representa el sistema software que se quiere estimar. Desde él se crean los análisis de tamaño y las conversiones a esfuerzo.
help.projects.create.title=Crear un proyecto
help.projects.create.step1=Ir al menú Proyectos.
help.projects.create.step2=Pulsar Crear proyecto.
help.projects.create.step3=Introducir nombre y descripción.
help.projects.create.step4=Indicar una tarifa por hora si se desea calcular coste.
help.projects.create.step5=Indicar la moneda, por ejemplo EUR.
help.projects.create.step6=Guardar.
help.projects.hourlyRate=La tarifa horaria es opcional. Si no se indica, la aplicación calculará esfuerzo, pero no coste económico.

help.memberships.title=Trabajadores y permisos en proyectos
help.memberships.text=Un jefe de proyecto puede asignar trabajadores a sus proyectos y decidir qué permisos tendrá cada uno.
help.memberships.step1=Abrir el detalle del proyecto.
help.memberships.step2=Pulsar Gestionar trabajadores.
help.memberships.step3=Seleccionar el trabajador.
help.memberships.step4=Marcar los permisos que tendrá dentro del proyecto.
help.memberships.step5=Guardar la asignación.
help.memberships.editPermission.title=Permiso para editar datos de estimación
help.memberships.editPermission.text=Permite modificar datos internos de los análisis, como módulos, requisitos, funciones, actores, casos de uso y factores.
help.memberships.conversionPermission.title=Permiso para gestionar conversiones a esfuerzo
help.memberships.conversionPermission.text=Permite crear y gestionar conversiones mediante Delphi o funciones de transformación.

help.fp.title=Análisis de Puntos Función
help.fp.text=El análisis de Puntos Función permite estimar el tamaño funcional del proyecto a partir de requisitos y funciones.
help.fp.steps.title=Cómo completar un análisis PF
help.fp.steps.step1=Abrir el detalle del proyecto.
help.fp.steps.step2=Crear o abrir el análisis de Puntos Función.
help.fp.steps.step3=Definir el límite del sistema.
help.fp.steps.step4=Crear módulos funcionales.
help.fp.steps.step5=Añadir requisitos de usuario dentro de cada módulo.
help.fp.steps.step6=Identificar funciones de datos y funciones transaccionales asociadas a los requisitos.
help.fp.steps.step7=Valorar las características generales del sistema.
help.fp.steps.step8=Revisar o editar la matriz de pesos.
help.fp.steps.step9=Consultar los resultados calculados.
help.fp.modules.title=Módulos PF
help.fp.modules.text=Los módulos sirven para dividir el sistema en partes funcionales y organizar mejor requisitos, funciones y resultados.
help.fp.requirements.title=Requisitos de usuario
help.fp.requirements.text=Los requisitos describen necesidades funcionales del sistema. Cada requisito tiene un identificador y un enunciado.
help.fp.dataFunctions.title=Funciones de datos
help.fp.dataFunctions.text=Las funciones de datos representan grupos lógicos de información utilizados por el sistema.
help.fp.dataFunctions.ilf.title=ILF
help.fp.dataFunctions.ilf.text=Fichero lógico interno. Representa información mantenida por la propia aplicación.
help.fp.dataFunctions.eif.title=EIF
help.fp.dataFunctions.eif.text=Fichero de interfaz externa. Representa información utilizada por la aplicación pero mantenida por otro sistema.
help.fp.transactionalFunctions.title=Funciones transaccionales
help.fp.transactionalFunctions.text=Las funciones transaccionales representan operaciones realizadas por el sistema.
help.fp.transactionalFunctions.ei.title=EI
help.fp.transactionalFunctions.ei.text=Entrada externa. Representa una operación en la que se introducen datos en la aplicación.
help.fp.transactionalFunctions.eo.title=EO
help.fp.transactionalFunctions.eo.text=Salida externa. Representa una operación que genera información de salida con procesamiento o cálculo.
help.fp.transactionalFunctions.eq.title=EQ
help.fp.transactionalFunctions.eq.text=Consulta externa. Representa una consulta de información sin procesamiento complejo.
help.fp.complexity.title=Complejidad
help.fp.complexity.text=Cada función se clasifica como simple, media o compleja. La aplicación usa esa complejidad junto con el tipo de función para obtener su peso.
help.fp.gsc.title=Características generales del sistema
help.fp.gsc.text=Las características generales del sistema se valoran de 0 a 5 y permiten ajustar el resultado del análisis.
help.fp.weights.title=Matriz de pesos
help.fp.weights.text=La matriz de pesos indica el peso de cada función según su tipo y complejidad. Si se modifica, los resultados se recalculan.
help.fp.results.title=Resultados PF
help.fp.results.ufp=UFP: Puntos Función No Ajustados.
help.fp.results.tdi=TDI: grado total de influencia.
help.fp.results.vaf=VAF: factor de ajuste del valor.
help.fp.results.afp=AFP: Puntos Función Ajustados.

help.ucp.title=Análisis Use Case Points
help.ucp.text=El análisis Use Case Points permite estimar el tamaño del proyecto a partir de actores, casos de uso, factores técnicos y factores ambientales.
help.ucp.steps.title=Cómo completar un análisis UCP
help.ucp.steps.step1=Abrir el detalle del proyecto.
help.ucp.steps.step2=Crear o abrir el análisis Use Case Points.
help.ucp.steps.step3=Definir el límite del sistema.
help.ucp.steps.step4=Crear actores.
help.ucp.steps.step5=Crear módulos.
help.ucp.steps.step6=Crear casos de uso dentro de los módulos.
help.ucp.steps.step7=Asociar actores a los casos de uso.
help.ucp.steps.step8=Revisar factores técnicos y ambientales.
help.ucp.steps.step9=Consultar los resultados calculados.
help.ucp.actors.title=Actores
help.ucp.actors.text=Los actores representan usuarios, sistemas externos u otras entidades que interactúan con el sistema.
help.ucp.actors.simple.title=Simple
help.ucp.actors.simple.text=Actor con una interacción sencilla con el sistema.
help.ucp.actors.average.title=Medio
help.ucp.actors.average.text=Actor con una interacción intermedia o más estructurada.
help.ucp.actors.complex.title=Complejo
help.ucp.actors.complex.text=Actor con una interacción más completa con el sistema.
help.ucp.actors.delete=No se puede eliminar un actor si está asociado a uno o más casos de uso. Primero debe eliminarse esa asociación o eliminar los casos de uso correspondientes.
help.ucp.modules.title=Módulos UCP
help.ucp.modules.text=Los módulos permiten organizar los casos de uso y revisar resultados parciales.
help.ucp.useCases.title=Casos de uso
help.ucp.useCases.text=Los casos de uso describen funcionalidades del sistema.
help.ucp.useCases.fields=Un caso de uso puede incluir nombre, descripción, actores, módulo, condición de inicio, precondiciones, postcondiciones, flujo normal, flujos alternativos, excepciones y número de transacciones.
help.ucp.complexity.title=Complejidad de casos de uso
help.ucp.complexity.simple=1 a 3 transacciones: simple.
help.ucp.complexity.average=4 a 7 transacciones: medio.
help.ucp.complexity.complex=8 o más transacciones: complejo.
help.ucp.factors.title=Factores técnicos y ambientales
help.ucp.factors.text=Los factores técnicos y ambientales permiten ajustar el resultado según características del sistema y condiciones del entorno del proyecto.
help.ucp.results.title=Resultados UCP
help.ucp.results.uaw=UAW: peso no ajustado de actores.
help.ucp.results.uucw=UUCW: peso no ajustado de casos de uso.
help.ucp.results.tcf=TCF: factor de complejidad técnica.
help.ucp.results.ecf=ECF: factor de complejidad ambiental.
help.ucp.results.ucp=UCP: tamaño final ajustado en Use Case Points.

help.effort.title=Conversión a esfuerzo
help.effort.text=Después de calcular el tamaño del proyecto, se puede convertir ese tamaño en esfuerzo expresado en horas-persona.
help.effort.delphi.title=Delphi
help.effort.delphi.text=Delphi permite estimar esfuerzo usando estimaciones de expertos sobre módulos de referencia.
help.effort.delphi.step1=Abrir un análisis PF o UCP.
help.effort.delphi.step2=Pulsar Iniciar conversión Delphi.
help.effort.delphi.step3=Indicar número máximo de iteraciones, desviación aceptable y número de expertos.
help.effort.delphi.step4=Registrar las estimaciones de los expertos.
help.effort.delphi.step5=Revisar el esfuerzo final calculado.
help.effort.transformation.title=Funciones de transformación
help.effort.transformation.text=Las funciones de transformación convierten el tamaño en esfuerzo mediante una fórmula lineal.
help.effort.transformation.formula=Esfuerzo = a + b × tamaño

help.cost.title=Coste estimado
help.cost.text=Si el proyecto tiene una tarifa horaria, la aplicación calcula automáticamente el coste estimado.
help.cost.formula=Coste estimado = esfuerzo estimado × tarifa horaria

help.outputs.title=XML e informes
help.outputs.xml.title=Importar y exportar XML
help.outputs.xml.text=La aplicación permite exportar análisis PF y UCP a XML e importar análisis desde un archivo XML válido.
help.outputs.xml.warning=Solo se puede importar un análisis si el proyecto todavía no tiene un análisis del mismo tipo.
help.outputs.reports.title=Informes PDF
help.outputs.reports.text=Los informes PDF permiten guardar o compartir los resultados de un análisis, incluyendo datos del proyecto, resultados, módulos y conversiones a esfuerzo.

help.recommendations.title=Recomendaciones de uso
help.recommendations.item1=Crear primero la estructura general del proyecto.
help.recommendations.item2=Usar módulos para dividir el sistema en partes funcionales claras.
help.recommendations.item3=No crear conversiones a esfuerzo hasta revisar el análisis de tamaño.
help.recommendations.item4=Configurar la tarifa horaria si se quiere obtener coste estimado.
help.recommendations.item5=Generar informes PDF para documentar o compartir una estimación.
help.recommendations.item6=Exportar XML si se quiere conservar o trasladar los datos del análisis.

