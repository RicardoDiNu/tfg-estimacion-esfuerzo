help.title=Help
help.workflow.title=Recommended workflow
help.workflow.step1=Create an estimation project.
help.workflow.step2=Define a size technique: Function Points or UCP.
help.workflow.step3=Complete the selected analysis data.
help.workflow.step4=Create an effort conversion using Delphi or a transformation function.
help.workflow.step5=Review the calculated effort and, if an hourly rate exists, the estimated cost.
help.projects.title=Projects
help.projects.text=Each estimation starts from a project. A project can include a name, description and an optional hourly rate for cost calculation.
help.size.title=Size techniques
help.size.fp.title=Function Points
help.size.fp.text=Allows functional size estimation from data functions, transactional functions and general system characteristics.
help.size.ucp.title=Use Case Points
help.size.ucp.text=Allows size estimation from actors, use cases, technical factors and environmental factors.
help.effort.title=Effort conversion
help.effort.delphi.title=Delphi
help.effort.delphi.text=Uses expert estimates on the smallest and largest modules to obtain a linear effort function.
help.effort.transformation.title=Transformation functions
help.effort.transformation.text=Allow applying a linear formula such as E = a + b × size to convert size into person-hours.
help.cost.title=Cost
help.cost.text=If the project has an hourly rate configured, the system automatically calculates the estimated cost by multiplying person-hours by that rate.

