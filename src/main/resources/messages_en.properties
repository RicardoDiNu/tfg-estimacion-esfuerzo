# =========================
# About
# =========================
about.title=About

about.project.title=About the application
about.project.text1=This web application allows users to manage software estimation projects and calculate their size, effort and cost.
about.project.text2=The system brings together project management, estimation techniques, effort conversion and result generation in a single tool.
about.project.text3=The application has been developed as a Final Degree Project in Software Engineering.

about.scope.title=Functional scope
about.scope.projects=Management of estimation projects.
about.scope.users=Management of users, roles, workers and project permissions.
about.scope.size=Size estimation using Function Points and Use Case Points.
about.scope.effort=Size-to-effort conversion using Delphi and transformation functions.
about.scope.cost=Cost estimation from person-hours and hourly rate.
about.scope.outputs=PDF report generation and XML import/export.

about.features.title=Included techniques
about.features.size.title=Size estimation techniques
about.features.fp=Function Points.
about.features.ucp=Use Case Points.
about.features.effort.title=Effort conversion techniques
about.features.delphi=Delphi.
about.features.transformation=Transformation functions.

about.technical.title=Technical basis
about.technical.text=The application is developed as a Java web application using Spring Boot, Thymeleaf, Spring Security, JPA/Hibernate and PostgreSQL.
about.technical.deployment=It can also be executed using Docker to make deployment on other machines easier.

