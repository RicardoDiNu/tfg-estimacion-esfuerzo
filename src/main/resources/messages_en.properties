about.title=About
about.project.title=About the project
about.project.text1=This application allows users to estimate software project size, effort and cost using different estimation techniques.
about.project.text2=The system has been developed as a Final Degree Project and aims to centralize the estimation process in a web application.
about.features.title=Included techniques
about.features.fp=Size estimation using Function Points.
about.features.ucp=Size estimation using Use Case Points.
about.features.delphi=Size-to-effort conversion using Delphi.
about.features.transformation=Size-to-effort conversion using transformation functions.
about.features.cost=Cost estimation from person-hours and hourly rate.
