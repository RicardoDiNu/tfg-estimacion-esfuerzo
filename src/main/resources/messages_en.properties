help.title=Help and user manual

help.common.type=Type
help.common.meaning=Meaning
help.common.complexity=Complexity

help.intro.title=Application user manual
help.intro.text1=This application allows users to create software estimation projects and calculate their size, effort and cost using different techniques.
help.intro.text2=The general flow consists of creating a project, completing a size analysis, converting that size into effort and reviewing the results.

help.access.title=Access, registration and login
help.access.signup.title=Public registration
help.access.signup.text1=A new account can be created from the registration page.
help.access.signup.text2=Accounts created through public registration are automatically created as project managers. This allows a new user to start creating their own estimation projects.
help.access.signup.text3=Workers are not created through public registration. They must be created by an administrator or by a project manager from user management.
help.access.login.title=Login
help.access.login.text=To work with projects, it is necessary to log in with a valid user.

help.workflow.title=General workflow
help.workflow.step1=Log in or sign up.
help.workflow.step2=Create an estimation project.
help.workflow.step3=Configure an hourly rate if cost calculation is required.
help.workflow.step4=Create a size analysis: Function Points or Use Case Points.
help.workflow.step5=Complete the analysis data.
help.workflow.step6=Review the calculated size.
help.workflow.step7=Create an effort conversion using Delphi or a transformation function.
help.workflow.step8=Review the estimated effort and cost.
help.workflow.step9=Generate PDF reports or export XML if necessary.

help.roles.title=User types
help.roles.admin.title=Administrator
help.roles.admin.text=The administrator manages system users. They can create project managers and workers, edit their basic data and perform general administration tasks.
help.roles.manager.title=Project manager
help.roles.manager.text=The project manager creates and manages their own projects. They can also create workers, assign them to projects and grant them permissions.
help.roles.worker.title=Project worker
help.roles.worker.text=The worker can only access the projects to which they have been assigned. Depending on their permissions, they can view data, edit analyses or manage effort conversions.

help.users.title=User management
help.users.createManager.title=Create a project manager
help.users.createManager.step1=Log in as an administrator.
help.users.createManager.step2=Go to the Users menu.
help.users.createManager.step3=Click Create user.
help.users.createManager.step4=Enter username, email address and password.
help.users.createManager.step5=Select the Project manager role.
help.users.createManager.step6=Save.
help.users.createWorker.title=Create a worker
help.users.createWorker.text=A worker can be created by an administrator or by a project manager. If created by a project manager, the worker is automatically associated with that manager.
help.users.createWorker.step1=Go to the Users menu.
help.users.createWorker.step2=Click Create user.
help.users.createWorker.step3=Enter username, email address and password.
help.users.createWorker.step4=If logged in as an administrator, select the associated project manager.
help.users.createWorker.step5=Save.
help.users.edit.title=Edit users
help.users.edit.text=From the user list, basic data such as email address or password can be modified.
help.users.delete.title=Delete users
help.users.delete.text=The application only allows users to be deleted when the operation is valid. There may be restrictions if the user has associated information.

help.account.title=My account
help.account.text1=Each user can view their data from the My account option.
help.account.text2=From this section, the email address can be modified and the password can be changed.
help.account.text3=The username, role and associated project manager are not modified from the personal account edit page.

help.projects.title=Estimation projects
help.projects.text=A project represents the software system to be estimated. Size analyses and effort conversions are created from it.
help.projects.create.title=Create a project
help.projects.create.step1=Go to the Projects menu.
help.projects.create.step2=Click Create project.
help.projects.create.step3=Enter name and description.
help.projects.create.step4=Enter an hourly rate if cost calculation is required.
help.projects.create.step5=Enter the currency, for example EUR.
help.projects.create.step6=Save.
help.projects.hourlyRate=The hourly rate is optional. If it is not provided, the application will calculate effort but not economic cost.

help.memberships.title=Workers and project permissions
help.memberships.text=A project manager can assign workers to their projects and decide which permissions each one will have.
help.memberships.step1=Open the project details.
help.memberships.step2=Click Manage workers.
help.memberships.step3=Select the worker.
help.memberships.step4=Select the permissions they will have within the project.
help.memberships.step5=Save the assignment.
help.memberships.editPermission.title=Permission to edit estimation data
help.memberships.editPermission.text=Allows internal analysis data to be modified, such as modules, requirements, functions, actors, use cases and factors.
help.memberships.conversionPermission.title=Permission to manage effort conversions
help.memberships.conversionPermission.text=Allows conversions using Delphi or transformation functions to be created and managed.

help.fp.title=Function Point analysis
help.fp.text=Function Point analysis allows the functional size of the project to be estimated from requirements and functions.
help.fp.steps.title=How to complete an FP analysis
help.fp.steps.step1=Open the project details.
help.fp.steps.step2=Create or open the Function Point analysis.
help.fp.steps.step3=Define the system boundary.
help.fp.steps.step4=Create functional modules.
help.fp.steps.step5=Add user requirements within each module.
help.fp.steps.step6=Identify data functions and transactional functions associated with the requirements.
help.fp.steps.step7=Rate the general system characteristics.
help.fp.steps.step8=Review or edit the weight matrix.
help.fp.steps.step9=View the calculated results.
help.fp.modules.title=FP modules
help.fp.modules.text=Modules are used to divide the system into functional parts and better organize requirements, functions and results.
help.fp.requirements.title=User requirements
help.fp.requirements.text=Requirements describe functional needs of the system. Each requirement has an identifier and a statement.
help.fp.dataFunctions.title=Data functions
help.fp.dataFunctions.text=Data functions represent logical groups of information used by the system.
help.fp.dataFunctions.ilf.title=ILF
help.fp.dataFunctions.ilf.text=Internal Logical File. Represents information maintained by the application itself.
help.fp.dataFunctions.eif.title=EIF
help.fp.dataFunctions.eif.text=External Interface File. Represents information used by the application but maintained by another system.
help.fp.transactionalFunctions.title=Transactional functions
help.fp.transactionalFunctions.text=Transactional functions represent operations performed by the system.
help.fp.transactionalFunctions.ei.title=EI
help.fp.transactionalFunctions.ei.text=External Input. Represents an operation where data is entered into the application.
help.fp.transactionalFunctions.eo.title=EO
help.fp.transactionalFunctions.eo.text=External Output. Represents an operation that generates output information with processing or calculation.
help.fp.transactionalFunctions.eq.title=EQ
help.fp.transactionalFunctions.eq.text=External Inquiry. Represents an information query without complex processing.
help.fp.complexity.title=Complexity
help.fp.complexity.text=Each function is classified as simple, average or complex. The application uses this complexity together with the function type to obtain its weight.
help.fp.gsc.title=General system characteristics
help.fp.gsc.text=General system characteristics are rated from 0 to 5 and allow the analysis result to be adjusted.
help.fp.weights.title=Weight matrix
help.fp.weights.text=The weight matrix indicates the weight of each function according to its type and complexity. If modified, the results are recalculated.
help.fp.results.title=FP results
help.fp.results.ufp=UFP: Unadjusted Function Points.
help.fp.results.tdi=TDI: total degree of influence.
help.fp.results.vaf=VAF: value adjustment factor.
help.fp.results.afp=AFP: Adjusted Function Points.

help.ucp.title=Use Case Points analysis
help.ucp.text=Use Case Points analysis allows the project size to be estimated from actors, use cases, technical factors and environmental factors.
help.ucp.steps.title=How to complete a UCP analysis
help.ucp.steps.step1=Open the project details.
help.ucp.steps.step2=Create or open the Use Case Points analysis.
help.ucp.steps.step3=Define the system boundary.
help.ucp.steps.step4=Create actors.
help.ucp.steps.step5=Create modules.
help.ucp.steps.step6=Create use cases within the modules.
help.ucp.steps.step7=Associate actors with use cases.
help.ucp.steps.step8=Review technical and environmental factors.
help.ucp.steps.step9=View the calculated results.
help.ucp.actors.title=Actors
help.ucp.actors.text=Actors represent users, external systems or other entities that interact with the system.
help.ucp.actors.simple.title=Simple
help.ucp.actors.simple.text=Actor with a simple interaction with the system.
help.ucp.actors.average.title=Average
help.ucp.actors.average.text=Actor with an intermediate or more structured interaction.
help.ucp.actors.complex.title=Complex
help.ucp.actors.complex.text=Actor with a more complete interaction with the system.
help.ucp.actors.delete=An actor cannot be deleted if it is associated with one or more use cases. The association must be removed first, or the corresponding use cases must be deleted.
help.ucp.modules.title=UCP modules
help.ucp.modules.text=Modules allow use cases to be organized and partial results to be reviewed.
help.ucp.useCases.title=Use cases
help.ucp.useCases.text=Use cases describe system functionalities.
help.ucp.useCases.fields=A use case may include name, description, actors, module, trigger condition, preconditions, postconditions, normal flow, alternative flows, exceptions and number of transactions.
help.ucp.complexity.title=Use case complexity
help.ucp.complexity.simple=1 to 3 transactions: simple.
help.ucp.complexity.average=4 to 7 transactions: average.
help.ucp.complexity.complex=8 or more transactions: complex.
help.ucp.factors.title=Technical and environmental factors
help.ucp.factors.text=Technical and environmental factors allow the result to be adjusted according to system characteristics and project environment conditions.
help.ucp.results.title=UCP results
help.ucp.results.uaw=UAW: unadjusted actor weight.
help.ucp.results.uucw=UUCW: unadjusted use case weight.
help.ucp.results.tcf=TCF: technical complexity factor.
help.ucp.results.ecf=ECF: environmental complexity factor.
help.ucp.results.ucp=UCP: final adjusted size in Use Case Points.

help.effort.title=Effort conversion
help.effort.text=After calculating the project size, that size can be converted into effort expressed in person-hours.
help.effort.delphi.title=Delphi
help.effort.delphi.text=Delphi allows effort to be estimated using expert estimates on reference modules.
help.effort.delphi.step1=Open an FP or UCP analysis.
help.effort.delphi.step2=Click Start Delphi conversion.
help.effort.delphi.step3=Enter the maximum number of iterations, acceptable deviation and number of experts.
help.effort.delphi.step4=Register the expert estimates.
help.effort.delphi.step5=Review the final calculated effort.
help.effort.transformation.title=Transformation functions
help.effort.transformation.text=Transformation functions convert size into effort using a linear formula.
help.effort.transformation.formula=Effort = a + b × size

help.cost.title=Estimated cost
help.cost.text=If the project has an hourly rate, the application automatically calculates the estimated cost.
help.cost.formula=Estimated cost = estimated effort × hourly rate

help.outputs.title=XML and reports
help.outputs.xml.title=Import and export XML
help.outputs.xml.text=The application allows FP and UCP analyses to be exported to XML and imported from a valid XML file.
help.outputs.xml.warning=An analysis can only be imported if the project does not already have an analysis of the same type.
help.outputs.reports.title=PDF reports
help.outputs.reports.text=PDF reports allow analysis results to be saved or shared, including project data, results, modules and effort conversions.

help.recommendations.title=Usage recommendations
help.recommendations.item1=Create the general project structure first.
help.recommendations.item2=Use modules to divide the system into clear functional parts.
help.recommendations.item3=Do not create effort conversions until the size analysis has been reviewed.
help.recommendations.item4=Configure the hourly rate if estimated cost is required.
help.recommendations.item5=Generate PDF reports to document or share an estimation.
help.recommendations.item6=Export XML if the analysis data needs to be preserved or transferred.

