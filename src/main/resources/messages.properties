help.projects.title=Proyectos
help.projects.text=Cada estimación parte de un proyecto. En él se puede indicar nombre, descripción y una tarifa por hora opcional para calcular costes.
help.size.title=Técnicas de tamaño
help.size.fp.title=Puntos Función
help.size.fp.text=Permite estimar el tamaño funcional a partir de funciones de datos, funciones transaccionales y características generales del sistema.
help.size.ucp.title=Use Case Points
help.size.ucp.text=Permite estimar el tamaño a partir de actores, casos de uso, factores técnicos y factores ambientales.
help.effort.title=Conversión a esfuerzo
help.effort.delphi.title=Delphi
help.effort.delphi.text=Utiliza estimaciones de expertos sobre módulos de menor y mayor tamaño para obtener una función lineal de esfuerzo.
help.effort.transformation.title=Funciones de transformación
help.effort.transformation.text=Permiten aplicar una fórmula lineal del tipo E = a + b × tamaño para convertir tamaño en horas-persona.
help.cost.title=Coste
help.cost.text=Si el proyecto tiene configurada una tarifa por hora, el sistema calcula automáticamente el coste estimado multiplicando las horas-persona por dicha tarifa.


