services:
  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: tfg-estimacion-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tfg_estimacion_esfuerzo}
      POSTGRES_USER: ${POSTGRES_USER:-tfg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tfg_user} -d ${POSTGRES_DB:-tfg_estimacion_esfuerzo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tfg-estimacion-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-tfg_estimacion_esfuerzo}
      DB_USER: ${POSTGRES_USER:-tfg_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      SPRING_JPA_SHOW_SQL: "false"
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      APP_INITIAL_ADMIN_ENABLED: ${APP_INITIAL_ADMIN_ENABLED:-true}
      APP_INITIAL_ADMIN_USERNAME: ${APP_INITIAL_ADMIN_USERNAME:-admin}
      APP_INITIAL_ADMIN_EMAIL: ${APP_INITIAL_ADMIN_EMAIL:-admin@estimacion.local}
      APP_INITIAL_ADMIN_PASSWORD: ${APP_INITIAL_ADMIN_PASSWORD:?Debes definir APP_INITIAL_ADMIN_PASSWORD en el fichero .env}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data: